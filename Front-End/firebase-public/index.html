    <!-- SILENCIAMIENTO INMEDIATO DE ERRORES DE TERCEROS - ANTES DE CUALQUIER SCRIPT -->
    <script>
      // SILENCIAR ERRORES DE TERCEROS INMEDIATAMENTE - PRIMERA LÍNEA DE EJECUCIÓN
      (function() {
        'use strict';
        
        // Guardar métodos originales
        const originalError = console.error;
        const originalWarn = console.warn;
        const originalLog = console.log;
        
        // Función de filtrado ultra agresiva
        function shouldSilenceMessage(message) {
          const msg = message.toLowerCase();
          
          // Lista negra exhaustiva de errores de terceros
          const blockedPatterns = [
            'cross-origin-opener-policy',
            'attribution-reporting',
            'browsing-topics',
            'fbevents.js',
            'postmessage',
            'js?id=g-n7dqdvm8med',
            '1304105440826069',
            'gtm-nlvcrsjr',
            'unrecognized feature',
            'facebook',
            'google-analytics',
            'googletagmanager',
            'doubleclick',
            'analytics',
            'gtag',
            'fbq',
            'postmessage',
            'policy would block',
            'window.postmessage'
          ];
          
          return blockedPatterns.some(pattern => msg.includes(pattern));
        }
        
        // Reemplazar console.error
        console.error = function(...args) {
          const message = args.join(' ');
          if (shouldSilenceMessage(message)) {
            return; // Silenciar errores de terceros
          }
          return originalError.apply(console, args);
        };
        
        // Reemplazar console.warn
        console.warn = function(...args) {
          const message = args.join(' ');
          if (shouldSilenceMessage(message)) {
            return; // Silenciar warnings de terceros
          }
          return originalWarn.apply(console, args);
        };
        
        // Reemplazar console.log (solo para errores específicos)
        console.log = function(...args) {
          const message = args.join(' ');
          if (shouldSilenceMessage(message)) {
            return; // Silenciar logs de terceros problemáticos
          }
          return originalLog.apply(console, args);
        };
        
        // Envolver postMessage para evitar errores COOP
        if (typeof window !== 'undefined') {
          const originalPostMessage = window.postMessage;
          window.postMessage = function(...args) {
            try {
              return originalPostMessage.apply(this, args);
            } catch (error) {
              // Silenciar errores de cross-origin
              if (error.message && (
                error.message.includes('cross-origin') || 
                error.message.includes('opener') ||
                error.message.includes('policy')
              )) {
                return;
              }
              throw error;
            }
          };
        }
        
        // Marcar que el silenciamiento está activo
        window.__ERROR_SILENCING_ACTIVE = true;
        
        // Interceptar errores no capturados
        window.addEventListener('error', function(event) {
          if (shouldSilenceMessage(event.message)) {
            event.preventDefault();
            event.stopPropagation();
            return false;
          }
        });
        
        // Interceptar promesas rechazadas
        window.addEventListener('unhandledrejection', function(event) {
          if (event.reason && shouldSilenceMessage(event.reason.toString())) {
            event.preventDefault();
            event.stopPropagation();
            return false;
          }
        });
        
      })();
    </script>

    <!-- Analytics Lazy Loader -->
    <script>

        function loadAnalytics() {
          if (analyticsLoaded) return;

          // Add COOP policy to prevent postMessage errors

            f.parentNode.insertBefore(j, f);
          })(window, document, "script", "dataLayer", "GTM-NLVCRSJR");

          // GTAG

          gtagScript.async = true;
          gtagScript.src =
            "https://www.googletagmanager.com/gtag/js?id=G-N7DQDV8MED";
          document.head.appendChild(gtagScript);

          window.dataLayer = window.dataLayer || [];
          function gtag() {
            dataLayer.push(arguments);
          }
          gtag("js", new Date());
          gtag("config", "G-N7DQDV8MED");

          // Meta Pixel with Permissions-Policy to avoid console noise
          !(function (f, b, e, v, n, t, s) {
            if (f.fbq) return;
            n = f.fbq = function () {
              n.callMethod
                ? n.callMethod.apply(n, arguments)
                : n.queue.push(arguments);
            };
            if (!f._fbq) f._fbq = n;
            n.push = n;
            n.loaded = !0;
            n.version = "2.0";
            n.queue = [];
            t = b.createElement(e);
            t.async = !0;
            t.src = v;
            s = b.getElementsByTagName(e)[0];
            s.parentNode.insertBefore(t, s);
          })(
            window,
            document,
            "script",
            "https://connect.facebook.net/en_US/fbevents.js",
          );
          fbq("init", "1304105440826069");
          fbq("track", "PageView");
          } catch (error) {
            console.warn("⚠️ Error loading analytics:", error);
          }
        }

        var events = ["mousedown", "keydown", "touchstart", "scroll"];
        events.forEach(function (e) {
          window.addEventListener(e, loadAnalytics, {
            once: true,
            passive: true,
          });
        });
        setTimeout(loadAnalytics, 8000);
      })();
