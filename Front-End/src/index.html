    <!-- Error Silencing Strategy (Third-party noise reduction) -->
    <script>
      (function() {
        'use strict';
        const originalError = console.error;
        const originalWarn = console.warn;
        
        function isThirdPartyNoise(args) {
          const fullMsg = args.map(arg => {
            try {
              if (typeof arg === 'string') return arg;
              if (arg instanceof Error) return arg.message + ' ' + arg.stack;
              return JSON.stringify(arg);
            } catch (e) { return String(arg); }
          }).join(' ').toLowerCase();

          return [
            'cross-origin-opener-policy', 'attribution-reporting', 'browsing-topics',
            'fbevents.js', 'postmessage', 'google-analytics', 'googletagmanager',
            'doubleclick', 'facebook', 'gtm', 'gtag', 'user-agent-client-hints',
            'permissions-policy', 'unrecognized feature'
          ].some(pattern => fullMsg.includes(pattern));
        }
        
        console.error = function(...args) {
          if (isThirdPartyNoise(args)) return;
          return originalError.apply(console, args);
        };
        
        console.warn = function(...args) {
          if (isThirdPartyNoise(args)) return;
          return originalWarn.apply(console, args);
        };

        window.addEventListener('error', function(event) {
          const msg = (event.message || '').toLowerCase();
          if (isThirdPartyNoise([msg, event.filename, event.error])) {
            event.stopImmediatePropagation();
            event.preventDefault();
          }
        }, true);

        window.addEventListener('unhandledrejection', function(event) {
          const reason = event.reason ? String(event.reason).toLowerCase() : '';
          if (isThirdPartyNoise([reason])) {
            event.stopImmediatePropagation();
            event.preventDefault();
          }
        }, true);
      })();
    </script>
